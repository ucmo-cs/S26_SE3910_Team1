spring.application.name=backend

spring.datasource.url=jdbc:h2:mem:bankdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Email (Spring Mail) ---
# Recipients: TO is always the customer's email from the booking form (no config needed).
# MAIL_USERNAME / MAIL_PASSWORD: login for YOUR outbound mailbox (the "From" / SMTP relay account),
# not the customer's address. Gmail etc. require a real account you own to send mail.
# Gmail: use an App Password (Google Account → Security → 2-Step Verification → App passwords).
# Windows PowerShell: $env:MAIL_USERNAME="your.bank@gmail.com"; $env:MAIL_PASSWORD="app-password"
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Optional: From address if it must differ from MAIL_USERNAME
# app.mail.from=noreply@yourbank.com
